<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>KR</title>

<style>
body {
  background: #0d1117;
  color: white;
  font-family: Arial;
  text-align: center;
}

.container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
  margin-top: 50px;
}

.box {
  width: 150px;
  height: 150px;
  background: #161b22;
  border-radius: 15px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: 0.3s;
}

.box:hover {
  background: #238636;
  transform: scale(1.1);
}

a {
  color: white;
  text-decoration: none;
  font-size: 18px;
}
</style>

</head>

<body>

<h1>KR 🔥</h1>

<div class="container">

  <div class="box">
    <a href="https://google.com">Google</a>
  </div>

  <div class="box">
    <a href="https://youtube.com">YouTube</a>
  </div>

  <div class="box">
    <a href="https://github.com">GitHub</a>
  </div>

</div>

</body>
</html>
